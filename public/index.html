<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Njabulo Jb | PAIR CODE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #9932cc;
            --accent: #ff69b4;
            --success: #4caf50;
            --error: #f44336;
            --warning: #ff9800;
            --info: #2196f3;
            
            /* White theme colors */
            --text: #333333;
            --text-light: #666666;
            --background: #ffffff;
            --card-bg: #ffffff;
            --input-bg: #f8f9fa;
            --border-color: #e0e0e0;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 15px 40px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: var(--transition);
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.6;
            padding: 20px;
            position: relative;
        }

        /* Online Status Indicator */
        .status-indicator {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--success);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: var(--shadow);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        .home-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: var(--shadow);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .container {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .logo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary);
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            color: var(--text-light);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 2rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 600;
            color: var(--text);
            font-size: 1rem;
        }

        .input-container {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-container i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.1rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 18px 18px 50px;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            background-color: var(--input-bg);
            color: var(--text);
            font-size: 1.1rem;
            transition: var(--transition);
            font-weight: 500;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(138, 43, 226, 0.1);
            background-color: white;
        }

        /* Loading Line Animation */
        .loading-line {
            width: 100%;
            height: 4px;
            background-color: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin: 1rem 0;
            display: none;
        }

        .loading-line-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #81c784);
            border-radius: 2px;
            animation: loadingProgress 3s ease-in-out;
        }

        @keyframes loadingProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }


        /* Beautiful Buttons */
        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 18px 24px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            transition: var(--transition);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        #result {
            margin-top: 2rem;
            padding: 2rem;
            border-radius: 15px;
            display: none;
            animation: fadeIn 0.5s ease-out;
            text-align: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border: 2px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        #pair-code {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin: 1.5rem 0;
            letter-spacing: 3px;
            padding: 1rem;
            background: white;
            border-radius: 10px;
            border: 2px dashed var(--primary);
            animation: codeGlow 2s infinite alternate;
        }

        @keyframes codeGlow {
            0% { box-shadow: 0 0 10px rgba(138, 43, 226, 0.2); }
            100% { box-shadow: 0 0 20px rgba(138, 43, 226, 0.4); }
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .action-btn {
            padding: 15px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
            text-decoration: none;
        }

        .copy-btn {
            background: linear-gradient(135deg, var(--success) 0%, #66bb6a 100%);
            color: white;
            border: none;
            box-shadow: var(--shadow);
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .refresh-btn {
            background: linear-gradient(135deg, var(--info) 0%, #42a5f5 100%);
            color: white;
            border: none;
            box-shadow: var(--shadow);
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .back-btn {
            background: linear-gradient(135deg, var(--warning) 0%, #ffb74d 100%);
            color: white;
            border: none;
            box-shadow: var(--shadow);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .share-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #f06292 100%);
            color: white;
            border: none;
            box-shadow: var(--shadow);
        }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        /* Messages */
        .success-message {
            background: linear-gradient(135deg, var(--success) 0%, #66bb6a 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 1rem;
            display: none;
            animation: slideIn 0.5s ease-out;
            box-shadow: var(--shadow);
        }

        .expiry-message {
            background: linear-gradient(135deg, var(--warning) 0%, #ffb74d 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 1rem;
            display: none;
            animation: slideIn 0.5s ease-out;
            box-shadow: var(--shadow);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-message {
            color: var(--error);
            background: rgba(244, 67, 54, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            display: none;
            animation: shake 0.5s;
            border-left: 4px solid var(--error);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .action-buttons {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }

            .status-indicator {
                top: 10px;
                left: 10px;
                padding: 6px 12px;
                font-size: 0.8rem;
            }

            .home-btn {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 0.9rem;
            }
        }

        /* Particles for white background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(138, 43, 226, 0.1);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <!-- Online Status Indicator -->
    <div class="status-indicator">
        <div class="status-dot"></div>
        <i class="fas fa-wifi"></i>
        <span>Online</span>
    </div>
    
    <a href="./" class="home-btn">
        <i class="fas fa-home"></i>
        <span>Home</span>
    </a>
    
    
    <div class="container">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/NjabuloJf/Njabulo-Jb/main/public/fanaa.jpg" alt="GWM-XMD">
        </div>
        
        <h1><i class="fas fa-qrcode"></i> Session Scan Code</h1>
        <p><i class="fas fa-info-circle"></i> Enter your WhatsApp number without + sign</p>
        
        <div class="form-group">
            <label for="phone-number">
                <i class="fas fa-phone"></i> Phone Number
            </label>
            <div class="input-container">
                <i class="fas fa-mobile-alt"></i>
                <input type="text" id="phone-number" placeholder="e.g., 1234567890" inputmode="numeric" pattern="[0-9]*">
            </div>
            <div class="error-message" id="error-message">
                <i class="fas fa-exclamation-triangle"></i>
                Please enter a valid phone number (10-15 digits)
            </div>
        </div>
        
        <!-- Loading Line -->
        <div class="loading-line" id="loading-line">
            <div class="loading-line-fill"></div>
        </div>
        
        <button id="submit" class="btn">
            <span id="btn-content">
                <i class="fas fa-paper-plane"></i>
                <span id="btn-text">Generate QR Code</span>
            </span>
            <span id="btn-spinner" style="display: none;">
                <i class="fas fa-spinner fa-spin"></i>
                <span>Processing...</span>
            </span>
        </button>
        
        <div id="result">
            <div style="margin-bottom: 1rem;">
                <i class="fas fa-check-circle" style="color: var(--success); font-size: 2rem;"></i>
                <p style="margin-top: 0.5rem; font-weight: 600;">Your pairing code is ready!</p>
            </div>
            
            <div id="pair-code"></div>
            
            <p style="margin: 1rem 0; color: var(--text-light);">
                <i class="fas fa-clock"></i>
                Enter this code in your WhatsApp linked devices
            </p>
            
            <div class="action-buttons">
                <button id="copy-btn" class="action-btn copy-btn">
                    <i class="fas fa-copy"></i>
                    <span>Copy Code</span>
                </button>
                <button id="refresh-btn" class="action-btn refresh-btn">
                    <i class="fas fa-sync-alt"></i>
                    <span>New Code</span>
                </button>
                <button id="share-btn" class="action-btn share-btn">
                    <i class="fas fa-share-alt"></i>
                    <span>Share</span>
                </button>
                <a href="./" class="action-btn back-btn">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back</span>
                </a>
            </div>
            
            <div class="success-message" id="success-message">
                <i class="fas fa-check-circle"></i>
                <span>Code copied to clipboard successfully!</span>
            </div>
            
            <div class="expiry-message" id="expiry-message">
                <i class="fas fa-hourglass-end"></i>
                <span>Code expired! Please generate a new one.</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
    <script>
        // Global variables
        let codeExpiryTimer = null;
        let codeGeneratedTime = null;
        
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = window.innerWidth < 768 ? 20 : 40;
            
            // Clear existing particles
            particlesContainer.innerHTML = '';
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 8 + 3;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                
                const duration = Math.random() * 15 + 10;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                
                particlesContainer.appendChild(particle);
            }
        }
        
        // Initialize particles
        createParticles();
        
        // Recreate particles periodically
        setInterval(createParticles, 30000);

        // DOM elements
        const submitButton = document.getElementById('submit');
        const phoneNumberInput = document.getElementById('phone-number');
        const resultDiv = document.getElementById('result');
        const pairCodeDiv = document.getElementById('pair-code');
        const copyButton = document.getElementById('copy-btn');
        const refreshButton = document.getElementById('refresh-btn');
        const shareButton = document.getElementById('share-btn');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        const expiryMessage = document.getElementById('expiry-message');
        const btnContent = document.getElementById('btn-content');
        const btnSpinner = document.getElementById('btn-spinner');
        const loadingLine = document.getElementById('loading-line');

        // Phone number validation
        function validatePhoneNumber(number) {
            const cleaned = number.replace(/\D/g, '');
            return cleaned.length >= 10 && cleaned.length <= 15;
        }

        // Show loading state
        function showLoading() {
            btnContent.style.display = 'none';
            btnSpinner.style.display = 'flex';
            submitButton.disabled = true;
            loadingLine.style.display = 'block';
            
            // Reset loading line animation
            const loadingFill = loadingLine.querySelector('.loading-line-fill');
            loadingFill.style.animation = 'none';
            setTimeout(() => {
                loadingFill.style.animation = 'loadingProgress 3s ease-in-out';
            }, 10);
        }

        // Hide loading state
        function hideLoading() {
            btnContent.style.display = 'flex';
            btnSpinner.style.display = 'none';
            submitButton.disabled = false;
            setTimeout(() => {
                loadingLine.style.display = 'none';
            }, 500);
        }

        // Show success message
        function showSuccessMessage(message, duration = 3000) {
            successMessage.querySelector('span').textContent = message;
            successMessage.style.display = 'block';
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, duration);
        }

        // Show expiry message
        function showExpiryMessage() {
            expiryMessage.style.display = 'block';
            pairCodeDiv.style.opacity = '0.5';
            copyButton.disabled = true;
            copyButton.style.opacity = '0.5';
        }

        // Set code expiry timer (5 minutes)
        function setExpiryTimer() {
            if (codeExpiryTimer) {
                clearTimeout(codeExpiryTimer);
            }
            
            codeGeneratedTime = Date.now();
            expiryMessage.style.display = 'none';
            pairCodeDiv.style.opacity = '1';
            copyButton.disabled = false;
            copyButton.style.opacity = '1';
            
            codeExpiryTimer = setTimeout(() => {
                showExpiryMessage();
            }, 5 * 60 * 1000); // 5 minutes
        }

        // Generate pairing code
        async function generateCode() {
            const phoneNumber = phoneNumberInput.value.trim();
            
            if (!validatePhoneNumber(phoneNumber)) {
                errorMessage.style.display = 'block';
                errorMessage.style.animation = 'shake 0.5s';
                setTimeout(() => {
                    errorMessage.style.animation = '';
                }, 500);
                return;
            }
            
            errorMessage.style.display = 'none';
            showLoading();
            
            
            try {
                const { data } = await axios.get(`/code?number=${phoneNumber}`);
                const code = data.code || "ERROR";
                
                pairCodeDiv.textContent = code;
                resultDiv.style.display = 'block';
                
                // Set expiry timer for the code
                setExpiryTimer();
                
                // Scroll to result
                resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                
                // Show success message
                showSuccessMessage('Code generated successfully!', 2000);
                
            } catch (error) {
                pairCodeDiv.textContent = "SERVICE ERROR";
                resultDiv.style.display = 'block';
                console.error("Error:", error);
                
                // Show error message
                showSuccessMessage('Failed to generate code. Please try again.', 3000);
            } finally {
                hideLoading();
            }
        }

        // Copy code to clipboard
        async function copyCode() {
            if (copyButton.disabled) return;
            
            const code = pairCodeDiv.textContent;
            try {
                await navigator.clipboard.writeText(code);
                showSuccessMessage('Code copied to clipboard!', 2000);
                
                // Add visual feedback
                copyButton.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    copyButton.style.transform = 'scale(1)';
                }, 150);
                
            } catch (error) {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = code;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                showSuccessMessage('Code copied to clipboard!', 2000);
            }
        }

        // Share code
        async function shareCode() {
            const code = pairCodeDiv.textContent;
            const shareData = {
                title: 'WhatsApp Pairing Code',
                text: `Your WhatsApp pairing code: ${code}`,
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                    showSuccessMessage('Code shared successfully!', 2000);
                } else {
                    // Fallback - copy to clipboard
                    await navigator.clipboard.writeText(`WhatsApp Pairing Code: ${code}`);
                    showSuccessMessage('Code copied for sharing!', 2000);
                }
            } catch (error) {
                console.error('Error sharing:', error);
            }
        }

        // Refresh/Generate new code
        function refreshCode() {
            generateCode();
        }

        // Event listeners
        submitButton.addEventListener('click', (e) => {
            e.preventDefault();
            generateCode();
        });

        copyButton.addEventListener('click', copyCode);
        refreshButton.addEventListener('click', refreshCode);
        shareButton.addEventListener('click', shareCode);

        // Input validation and formatting
        phoneNumberInput.addEventListener('input', (e) => {
            // Only allow numbers
            e.target.value = e.target.value.replace(/\D/g, '');
            
            // Hide error message when user starts typing
            if (errorMessage.style.display === 'block') {
                errorMessage.style.display = 'none';
            }
        });

        // Enter key support
        phoneNumberInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                generateCode();
            }
        });

        // Auto-focus on phone input
        window.addEventListener('load', () => {
            phoneNumberInput.focus();
        });

        // Update online status
        function updateOnlineStatus() {
            const statusIndicator = document.querySelector('.status-indicator');
            const statusText = statusIndicator.querySelector('span');
            const statusIcon = statusIndicator.querySelector('i');
            
            if (navigator.onLine) {
                statusIndicator.style.background = 'var(--success)';
                statusText.textContent = 'Online';
                statusIcon.className = 'fas fa-wifi';
            } else {
                statusIndicator.style.background = 'var(--error)';
                statusText.textContent = 'Offline';
                statusIcon.className = 'fas fa-wifi-slash';
            }
        }

        // Listen for online/offline events
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        // Initialize online status
        updateOnlineStatus();

        // Add some interactive effects
        document.querySelectorAll('.btn, .action-btn').forEach(button => {
            button.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-2px) scale(1.02)';
            });
            
            button.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0) scale(1)';
            });
        });

        // Add ripple effect to buttons
        function createRipple(event) {
            const button = event.currentTarget;
            const circle = document.createElement('span');
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - button.offsetLeft - radius}px`;
            circle.style.top = `${event.clientY - button.offsetTop - radius}px`;
            circle.classList.add('ripple');

            const ripple = button.getElementsByClassName('ripple')[0];
            if (ripple) {
                ripple.remove();
            }

            button.appendChild(circle);
        }

        // Add ripple effect CSS
        const rippleStyle = document.createElement('style');
        rippleStyle.textContent = `
            .ripple {
                position: absolute;
                border-radius: 50%;
                background-color: rgba(255, 255, 255, 0.6);
                transform: scale(0);
                animation: ripple-animation 0.6s linear;
                pointer-events: none;
            }
            
            @keyframes ripple-animation {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(rippleStyle);

        // Add ripple effect to all buttons
        document.querySelectorAll('.btn, .action-btn').forEach(button => {
            button.addEventListener('click', createRipple);
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (codeExpiryTimer) {
                clearTimeout(codeExpiryTimer);
            }
        });

        // Add some console styling for developers
        console.log('%c🚀 WhatsApp Pairing Code Generator', 'color: #8a2be2; font-size: 16px; font-weight: bold;');
        console.log('%c✨ Enhanced with beautiful UI and animations', 'color: #666; font-size: 12px;');
    </script>
</body>
</html>
